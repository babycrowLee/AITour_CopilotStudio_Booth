<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Studio + 방탈출 게임</title>

  <!-- ① Microsoft Bot Framework WebChat SDK -->
  <script
    crossorigin="anonymous"
    src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js">
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f2f1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 레이아웃: 좌 = 게임 iframe / 우 = WebChat ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* 게임 영역 */
    .game-panel {
      flex: 1 1 60%;
      min-width: 0;
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .game-panel iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    /* 스테이지 진행 표시줄 */
    .stage-bar {
      background: #1e1e2e;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      color: #8b949e;
      font-family: 'Segoe UI', monospace;
      border-bottom: 1px solid #30363d;
    }
    .stage-bar span { color: #e3b341; font-weight: 700; }
    .stage-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #30363d;
      transition: background .4s;
    }
    .stage-dot.reached { background: #3fb950; box-shadow: 0 0 6px #3fb950; }

    /* ══ WebChat 패널 ══════════════════════════════════════ */
    .chat-panel {
      flex: 0 0 40vw;
      min-width: 280px;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      border-left: 1px solid #e0e0e0;
    }

    /* ─ Powered by 배너 ─ */
    .chat-powered {
      background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
      color: rgba(255,255,255,.75);
      font-size: .78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      padding: 10px 0 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .chat-powered-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-powered-logo .cp-icon {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #0078d4, #50e6ff);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(80,230,255,.35);
    }
    .chat-powered strong {
      color: #ffffff;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .chat-powered em {
      color: #50e6ff;
      font-style: normal;
      font-weight: 600;
    }

    /* ─ 봇 헤더 카드 ─ */
    .chat-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .bot-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .bot-avatar-emoji {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e3b341, #f0a500);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 0 3px rgba(227,179,65,.35);
    }
    .bot-online-dot {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #4caf50;
      border: 2px solid #16213e;
      box-shadow: 0 0 6px #4caf50;
    }
    .bot-info { flex: 1; min-width: 0; }
    .bot-name {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bot-subtitle {
      font-size: .72rem;
      color: rgba(255,255,255,.55);
      margin-top: 2px;
    }
    /* 연결 상태 배지 */
    .status-badge {
      flex-shrink: 0;
      font-size: .65rem;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.2);
      white-space: nowrap;
    }
    .status-badge.connected {
      background: rgba(76,175,80,.25);
      border-color: #4caf50;
      color: #a5d6a7;
    }

    /* ─ 웰컴 스크린 ─ */
    #chat-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 16px;
      background: linear-gradient(180deg, #1e1e30 0%, #111827 100%);
    }
    .welcome-icon {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 16px rgba(227,179,65,.5));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .welcome-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e3b341;
      text-align: center;
    }
    .welcome-desc {
      font-size: .82rem;
      color: rgba(255,255,255,.55);
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }
    .welcome-tips {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      max-width: 300px;
    }
    .welcome-tips p {
      font-size: .75rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .welcome-tips li {
      font-size: .8rem;
      color: rgba(255,255,255,.7);
      list-style: none;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .welcome-tips li:last-child { border-bottom: none; }
    .welcome-tips li::before { content: '💡 '; }
    .btn-start-chat {
      margin-top: 4px;
      padding: 12px 32px;
      border: none;
      border-radius: 28px;
      background: linear-gradient(90deg, #e3b341, #f0a500);
      color: #1a1a2e;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(227,179,65,.45);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .5px;
    }
    .btn-start-chat:hover  { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(227,179,65,.6); }
    .btn-start-chat:active { transform: scale(.97); }

    /* ─ WebChat 컨테이너 ─ */
    #webchat-container {
      flex: 1;
      overflow: hidden;
      display: none;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── 왼쪽: 게임 ── -->
  <div class="game-panel">

    <!-- 스테이지 진행 표시줄 -->
    <div class="stage-bar">
      <span id="stage-label">Stage 0 · START</span>
      <div style="display:flex;gap:5px;margin-left:8px">
        <div class="stage-dot reached" id="dot-0" title="게임 시작"></div>
        <div class="stage-dot"         id="dot-1" title="단서 발견"></div>
        <div class="stage-dot"         id="dot-2" title="코드 파악"></div>
        <div class="stage-dot"         id="dot-3" title="열쇠 획득"></div>
        <div class="stage-dot"         id="dot-4" title="문 열림"></div>
        <div class="stage-dot"         id="dot-5" title="탈출 완료"></div>
      </div>
    </div>

    <!-- 게임 iframe -->
    <iframe
      id="game-frame"
      src="active_output_escape-room-3stage.html"
      title="방탈출 게임"
      allow="autoplay">
    </iframe>

  </div>

  <!-- ── 오른쪽: Copilot Studio WebChat ── -->
  <div class="chat-panel">

    <!-- Powered by 배너 -->
    <div class="chat-powered">
      <div class="chat-powered-logo">
        <div class="cp-icon">✨</div>
        <span><strong>Powered by</strong> <em>Copilot Studio</em></span>
      </div>
    </div>

    <!-- 봇 헤더 카드 -->
    <div class="chat-header">
      <div class="bot-avatar-wrap">
        <div class="bot-avatar-emoji">🕵️‍♂️</div>
        <div class="bot-online-dot" id="online-dot" style="display:none"></div>
      </div>
      <div class="bot-info">
        <div class="bot-name">왓슨</div>
        <div class="bot-subtitle">탐정의 비밀 수첩 도우미</div>
      </div>
      <span class="status-badge" id="status-badge">대기 중...</span>
    </div>

    <!-- 웰컴 스크린 (채팅 시작 전) -->
    <div id="chat-welcome">
      <div class="welcome-icon">🕵️‍♂️</div>
      <div class="welcome-title">안녕하세요, 저는 왓슨입니다!</div>
      <div class="welcome-desc">탐정님의 비밀 수첩 조수로, 여러분의 탈출을 돕겠습니다. 힌트가 필요하면 언제든지 묻어보세요!</div>
      <div class="welcome-tips">
        <p>학습 가이드</p>
        <ul>
          <li>"힌트를 줘" 라고 말하세요</li>
          <li>"다음 단계 알려줘" 라고 해보세요</li>
          <li>"어떻게 풀어요?" 라고 질문하세요</li>
        </ul>
      </div>
      <button class="btn-start-chat" id="btn-start" onclick="startChat()">💬 채팅 시작하기</button>
    </div>

    <!-- WebChat 컨테이너 -->
    <div id="webchat-container"></div>

  </div>

</div>


<script>
// ════════════════════════════════════════════════════════════
//  ② 설정값 — Copilot Studio 봇 토큰 또는 DirectLine Secret
// ════════════════════════════════════════════════════════════
const CONFIG = {
  // Copilot Studio → 설정 → 채널 → 모바일 앱 → DirectLine 토큰 엔드포인트
  // 또는 Bot Framework Portal의 DirectLine 시크릿을 사용하세요.
  //tokenEndpoint: 'https://80c44461561fe083b34d908b4dd9b9.05.environment.api.powerplatform.com/copilotstudio/dataverse-backed/authenticated/bots/copilots_header_72234/conversations?api-version=2022-03-01-preview',

  // (대체) 직접 시크릿 사용 시 주석 해제:
   directLineSecret: 'YOUR_DIRECT_LINE_SECRET_HERE',

  locale: 'ko-KR',
};

// ════════════════════════════════════════════════════════════
//  ③ WebChat Store 생성
//     → 이 store에 dispatch() 해서 봇에게 이벤트를 보냅니다.
// ════════════════════════════════════════════════════════════
const store = window.WebChat.createStore(
  {},
  () => next => action => next(action)
);

// ════════════════════════════════════════════════════════════
//  ④ DirectLine 초기화 및 WebChat 렌더링
// ════════════════════════════════════════════════════════════
async function initWebChat() {
  let directLine;

  try {
    // 토큰 엔드포인트 방식 (권장)
    const res   = await fetch(CONFIG.tokenEndpoint);
    const { token } = await res.json();
    directLine = window.WebChat.createDirectLine({ token });
  } catch {
    // 폴백: 시크릿 직접 사용 (개발 환경 전용)
    if (CONFIG.directLineSecret) {
      directLine = window.WebChat.createDirectLine({
        secret: CONFIG.directLineSecret
      });
    } else {
      console.warn('[WebChat] 토큰 엔드포인트 또는 시크릿을 CONFIG에 설정하세요.');
      document.getElementById('status-badge').textContent = '오프라인';
      return;
    }
  }

  window.WebChat.renderWebChat(
    {
      directLine,
      store,
      locale: CONFIG.locale,
      styleOptions: {
        hideUploadButton:         true,
        botAvatarInitials:        '🕵️‍♂️',
        userAvatarInitials:       '👤',
        primaryFont:              "'Segoe UI', sans-serif",
        rootHeight:               '100%',
        backgroundColor:          '#1a1a2e',
        bubbleBackground:         '#1e1e35',
        bubbleTextColor:          '#e6edf3',
        bubbleBorderColor:        '#30363d',
        bubbleFromUserBackground: '#e3b341',
        bubbleFromUserTextColor:  '#1a1a2e',
        sendBoxBackground:        '#111827',
        sendBoxTextColor:         '#e6edf3',
        sendBoxBorderTop:         '1px solid rgba(255,255,255,.1)',
        inputBorderColor:         'transparent',
        timestampColor:           'rgba(255,255,255,.3)',
      },
    },
    document.getElementById('webchat-container')
  );

  document.getElementById('status-badge').textContent = '연결됨';
  document.getElementById('status-badge').className   = 'status-badge connected';
  document.getElementById('online-dot').style.display  = 'block';

  // 연결 직후 startConversation 이벤트 전송 → Copilot Studio 웰컴 Topic 트리거
  setTimeout(() => {
    store.dispatch({
      type: 'WEB_CHAT/SEND_EVENT',
      payload: { name: 'startConversation', value: {} },
    });
    console.log('[Bridge] startConversation →');
  }, 800);
}

function startChat() {
  // 웰컴 스크린 숨기고 WebChat 표시
  document.getElementById('chat-welcome').style.display    = 'none';
  document.getElementById('webchat-container').style.display = 'flex';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('status-badge').textContent = '연결 중...';
  initWebChat();
}

// ════════════════════════════════════════════════════════════
//  ⑤ 게임 iframe → 부모 페이지 → Copilot Studio 브리지
//     게임이 postMessage({ channel, event: 'setContext', value })
//     를 보내면, WEB_CHAT/SEND_EVENT 로 변환해 봇에 전달합니다.
// ════════════════════════════════════════════════════════════
const GAME_CHANNEL = 'escape-room-v1';
const STAGE_LABELS = {
  0: 'START',
  1: 'CLUE_FOUND',
  2: 'CODE_KNOWN',
  3: 'KEY_OBTAINED',
  4: 'DOOR_OPEN',
  5: 'ESCAPED',
};

window.addEventListener('message', (e) => {
  // 출처 검증 (같은 오리진이면 '*' 대신 location.origin 으로 교체 가능)
  if (!e.data || e.data.channel !== GAME_CHANNEL) return;

  const { event, value } = e.data;

  // ── setContext 이벤트만 봇으로 전달 ──────────────────────
  if (event === 'setContext') {
    sendContextToBot(value);           // Copilot Studio로 전달
    updateStageUI(value.gCurrentStage); // 진행 표시줄 업데이트
  }

  // ── win 이벤트: 승리 메시지도 봇에 알림 ──────────────────
  if (event === 'win') {
    sendContextToBot({
      gCurrentStage:      5,
      gCurrentStageLabel: 'ESCAPED',
      gClearTime:         e.data.timeString ?? '',
    });
  }
});

/**
 * Copilot Studio System Topic 트리거:
 *   EventName = "setContext"
 *   System.Activity.Value.gCurrentStage  → gCurrentStage 변수에 저장
 */
function sendContextToBot(value) {
  store.dispatch({
    type: 'WEB_CHAT/SEND_EVENT',
    payload: {
      name:  'setContext',   // ← Copilot Studio 토픽의 EventName과 일치
      value: value,          // { gCurrentStage, gCurrentStageLabel, ... }
    },
  });
  console.log('[Bridge] setContext →', value);
}

// ════════════════════════════════════════════════════════════
//  ⑥ 진행 표시줄 UI 업데이트
// ════════════════════════════════════════════════════════════
function updateStageUI(stage) {
  document.getElementById('stage-label').textContent =
    `Stage ${stage} · ${STAGE_LABELS[stage] ?? ''}`;

  for (let i = 0; i <= 5; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (dot) dot.classList.toggle('reached', i <= stage);
  }
}
</script>
</body>
</html>
